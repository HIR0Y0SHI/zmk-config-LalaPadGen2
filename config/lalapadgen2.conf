# BLE
# Bluetooth Battery Service を有効化（バッテリー残量をホストへ通知）
CONFIG_BT_BAS=y
# BLE送信出力を +8dBm に設定（最大出力、接続安定性向上）
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

#XIAO
# NFCピンをGPIOとして使用（XIAO nRF52840でGPIOを増やすため）
CONFIG_NFCT_PINS_AS_GPIOS=y

#Trackpad
# I2Cバスを有効化（IQS9151タッチパッドとの通信に使用）
CONFIG_I2C=y
# ZMKポインティングデバイスサポートを有効化
CONFIG_ZMK_POINTING=y
# スムーズスクロールを有効化（スクロール量を細かく補間）
CONFIG_ZMK_POINTING_SMOOTH_SCROLLING=y
# IQS9151タッチパッドドライバを有効化
CONFIG_INPUT_IQS9151=y
# 入力処理スレッドのスタックサイズ（バイト）
CONFIG_INPUT_THREAD_STACK_SIZE=4096
# 設定の永続化を有効化
CONFIG_SETTINGS=y
# NVS（不揮発性ストレージ）をバックエンドとして使用
CONFIG_SETTINGS_NVS=y
# 設定保存のデバウンス時間（ms）：変更後2秒待ってからフラッシュに書き込む
CONFIG_ZMK_SETTINGS_SAVE_DEBOUNCE=2000

#ZMKSLEEP
# 省電力スリープ機能を有効化
CONFIG_ZMK_SLEEP=y
# アイドル状態になるまでの時間（ms）：300000ms = 5分
CONFIG_ZMK_IDLE_TIMEOUT=300000
# アイドルからディープスリープに移行するまでの時間（ms）：3600000ms = 1時間
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=3600000

#RGBLEDWIDGET
# バッテリー残量レポートを有効化
CONFIG_ZMK_BATTERY_REPORTING=y
# セントラル側でペリフェラルのバッテリー残量をプロキシ通知する
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
# セントラル側でペリフェラルのバッテリー残量を取得する
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
# バッテリー残量「高」の閾値（%）：30%以上で緑点灯
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_HIGH=30
# バッテリー残量「危険」の閾値（%）：10%以下で赤点灯
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_CRITICAL=10
# レイヤー切り替え時にLEDで通知する
CONFIG_RGBLED_WIDGET_SHOW_LAYER_CHANGE=y

#CHGLED
# 充電中インジケーターLEDを有効化
CONFIG_ZMK_EASY_CHARGE_INDICATOR=y

#STUDIO
# ZMK Studio（ブラウザからキーマップを編集するUI）を有効化
CONFIG_ZMK_STUDIO=y
# Studio接続時のロックを無効化（認証なしで接続可能）
CONFIG_ZMK_STUDIO_LOCKING=n

# トラックパッド
# 1Fカーソル慣性 有効/無効
CONFIG_INPUT_IQS9151_CURSOR_INERTIA_ENABLE=n

#Debug only
#CONFIG_ZMK_USB_LOGGING=y
#CONFIG_INPUT_LOG_LEVEL_DBG=y
